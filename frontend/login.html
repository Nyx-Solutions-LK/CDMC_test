<!DOCTYPE html>
<html data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign In — Nyx Solutions Client Portal</title>
  <script src="assets/js/theme.js"></script>
  <link rel="stylesheet" href="assets/css/theme.css">
</head>
<body>
  <div class="login-shell">
    <div class="login-card">
      <div class="login-brand">
        <div class="brand-mark"></div>
        <h1>Nyx Solutions</h1>
        <p>Client Portal</p>
      </div>
      <div id="loginAlert"></div>
      <form id="loginForm">
        <div class="field">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" autocomplete="username" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:11px" id="loginBtn">Sign In</button>
      </form>
      <div style="text-align:center;margin-top:18px">
        <button type="button" class="theme-toggle" data-theme-toggle style="margin:0 auto"></button>
      </div>
    </div>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/login.js"></script>
</body>
</html>
